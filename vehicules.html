<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Textures Véhicules | Texture Studio</title>
</head>
<body>
    <nav>
        <div class="logo">TEXTURE STUDIO</div>
        <div class="menu"><a href="index.html">Accueil</a><a href="portfolio.html">Portfolio</a><a href="contact.html">Contact</a></div>
    </nav>

    <div class="container">
        <h1>Textures Véhicules</h1>
        <div class="grid">
            <div class="card">
                <span class="category-badge">Lore-Friendly</span>
                <h3>Débadgeage Véhicule</h3>
                <p>Retrait des marques réelles (Mercedes, BMW, etc.) sur fichiers .ytd.</p>
                <span class="price-tag">15.00€</span>
                <button onclick="ajouterAuPanier('Débadgeage Véhicule', 15)" class="btn">Ajouter au panier</button>
            </div>
            <div class="card">
                <span class="category-badge">Custom</span>
                <h3>Livrées Personnalisées</h3>
                <p>Création de livrées Police, EMS ou Entreprises sur mesure.</p>
                <span class="price-tag">Dès 20.00€</span>
                <button onclick="ajouterAuPanier('Livrée Custom', 20)" class="btn">Ajouter au panier</button>
            </div>
        </div>
    </div>

    <div id="cart-btn" class="cart-floater" onclick="validerCommande()">🛒 Panier (<span id="cart-count">0</span>)</div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="script-firebase.js"></script>
</body>
</html>
