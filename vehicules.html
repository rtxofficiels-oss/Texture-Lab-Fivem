<!DOCTYPE html>
<html lang="fr">
<head>

    <link rel="stylesheet" href="style.css">
    <title>Véhicules | Texture Lab</title>

<body>
    <div id="login-bar">
        <input type="text" id="discord-input" placeholder="Pseudo Discord...">

    <nav>
        <div class="logo">

        <div class="menu">

    <div class="container">
