<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Services de Secours | Texture Studio</title>
</head>
<body>
    <div id="login-bar" style="background: #111; padding: 10px; text-align: center; border-bottom: 1px solid var(--primary);">
        <input type="text" id="discord-input" placeholder="Pseudo Discord..." style="background: #000; color: white; border: 1px solid var(--primary); padding: 5px; border-radius: 4px;">
        <button onclick="connexionDiscord()" class="btn" style="width: auto; padding: 5px 15px;">Se connecter</button>
        <span id="user-welcome" style="display:none; color: white; font-weight: bold;"></span>
    </div>

    <nav>
        <div class="logo">TEXTURE STUDIO</div>
        <div class="menu">
            <a href="index.html">Accueil</a>
            <a href="vehicules.html">Véhicules</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="container">
        <h1>Services de Secours</h1>
        <div class="grid">
            <div class="card">
                <h3>Packs Unités (LSPD/EMS)</h3>
                <p>Logos cohérents, badges de bras et vestes haute visibilité personnalisées.</p>
                <span class="price-tag">Dès 15.00€</span>
                <button onclick="ajouterAuPanier('Pack Secours EUP', 15)" class="btn">Ajouter au panier</button>
            </div>
        </div>
    </div>

    <div id="cart-btn" class="cart-floater" onclick="validerCommande()" style="display:none;">
        🛒 Panier (<span id="cart-count">0</span>)
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="script-firebase.js"></script>
</body>
</html>
