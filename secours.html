<!DOCTYPE html>

    <title>Secours | Texture Lab</title>
</head>
<body>
    <div id="login-bar">
        <input type="text" id="discord-input" placeholder="Pseudo Discord...">
        <button onclick="connexionDiscord()" class="btn" style="width: auto; padding: 5px 15px;">Se connecter</button>
        <span id="user-welcome" style="display:none;"></span>
    </div>

    <nav>
        <div class="logo"><img src="img/logo.png" alt="Logo" class="logo-img"></div>
        <div class="menu">
            <a href="index.html">Accueil</a>
            <div class="dropdown">

        <div class="grid">

                <span class="category-badge">EUP</span>

        </div>

    <div id="cart-btn" class="cart-floater" onclick="validerCommande()">🛒 Panier (<span id="cart-count">0</span>)</div>
