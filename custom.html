<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Custom | Texture Lab</title>
</head>
<body>
    <div id="login-bar">
        <input type="text" id="discord-input" placeholder="Pseudo Discord...">
        <button onclick="connexionDiscord()" class="btn" style="width: auto; padding: 5px 15px;">Se connecter</button>
        <span id="user-welcome" style="display:none;"></span>
    </div>

    <nav>
        <div class="logo"><img src="img/logo.png" alt="Logo" class="logo-img"></div>
        <div class="menu">
            <a href="index.html">Accueil</a>
            <a href="custom.html" class="active">Sur Mesure</a>
            <a href="portfolio.html">Portfolio</a>
        </div>
    </nav>

    <div class="container">
        <h1>Projets Personnalisés</h1>
        <div class="grid">
            <div class="card">
                <span class="category-badge">Unique</span>
                <h3>Design Exclusif</h3>
                <p>Confiez-nous vos idées pour une création 100% unique (EUP ou Véhicule).</p>
                <span class="price-tag">Sur Devis</span>
                <button onclick="ajouterAuPanier('Projet Custom Unique', 0)" class="btn">Ajouter à la demande</button>
            </div>
        </div>
    </div>

    <div id="cart-btn" class="cart-floater" onclick="validerCommande()">🛒 Panier (<span id="cart-count">0</span>)</div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="script-firebase.js"></script>
</body>
</html>
