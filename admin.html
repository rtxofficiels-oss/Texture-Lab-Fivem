<script>
    // ... config firebase ...

    // Afficher les commandes avec le Pseudo Discord
    db.collection("commandes_finales").orderBy("date", "desc").limit(20).onSnapshot((snapshot) => {
        const container = document.getElementById("commandes-list");
        container.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            container.innerHTML += `
                <div class="log-item">
                    <span>Pseudo: ${data.pseudo || "Anonyme"}</span><br>
                    <strong>Articles:</strong> ${data.articles}<br>
                    <small>${data.date.toDate().toLocaleString()}</small>
                </div>`;
        });
    });

    // Afficher qui a un panier actif en ce moment
    db.collection("paniers_actifs").orderBy("derniere_maj", "desc").limit(10).onSnapshot((snapshot) => {
        const container = document.getElementById("visites-list"); // On réutilise cette zone
        container.innerHTML = "<h3>Paniers en cours (non validés)</h3>";
        snapshot.forEach(doc => {
            const data = doc.data();
            container.innerHTML += `
                <div class="log-item" style="border-left-color: #5865F2;">
                    <span>Utilisateur: ${data.pseudo}</span><br>
                    ${data.articles.length} article(s) dans le panier<br>
                    <small>Dernière activité: ${data.derniere_maj.toDate().toLocaleString()}</small>
                </div>`;
        });
    });
</script>
