<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin | Texture Lab</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h3 { color: var(--neon-purple); border-bottom: 2px solid rgba(157, 0, 255, 0.2); padding-bottom: 10px; }
        .total-ca-box { padding: 15px; background: rgba(0, 229, 255, 0.05); border-radius: 8px; margin-bottom: 25px; border: 1px solid rgba(0, 229, 255, 0.2); }
        .total-ca-box strong { color: var(--neon-green); font-size: 1.4rem; }
        .log-item { background: var(--card); padding: 20px; margin-bottom: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); position: relative; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(255, 255, 255, 0.05); color: #ff4444; border: none; cursor: pointer; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Panel Admin <img src="img/logo.png" style="height:40px; vertical-align:middle;"></h1>
        
        <div id="commandes-list">
            <p>Chargement des commandes...</p>
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(157, 0, 255, 0.2); margin: 40px 0;">

        <div id="visites-list">
            <p>Chargement des paniers actifs...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDOLvy2PhthQZuBvaVPfq0TWquBuyP3gs4",
            authDomain: "texture-lab-fivem.firebaseapp.com",
            projectId: "texture-lab-fivem",
            storageBucket: "texture-lab-fivem.firebasestorage.app",
            messagingSenderId: "342541770662",
            appId: "1:342541770662:web:e1c9edd45f217f209d7967"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function supprimerDoc(collection, id) {
            if(confirm("Supprimer cette entrée ?")) {
                db.collection(collection).doc(id).delete();
            }
        }

        db.collection("commandes_finales").orderBy("date", "desc").limit(20).onSnapshot((snapshot) => {
            const container = document.getElementById("commandes-list");
            let totalCA = 0;
            container.innerHTML = "<h3>📦 Commandes Validées</h3>";
            snapshot.forEach(doc => {
                const data = doc.data();
                const prix = data.montant_total || 0;
                totalCA += prix;
                container.innerHTML += `
                    <div class="log-item" style="border-left: 4px solid var(--neon-green);">
                        <span style="color: var(--neon-green); font-weight: bold;">✅ VALIDÉE</span><br>
                        <span>Client: <strong>${data.pseudo}</strong></span><br>
                        <strong>Articles:</strong> ${data.articles}<br>
                        <strong>Total:</strong> ${prix}€<br>
                        <button onclick="supprimerDoc('commandes_finales', '${doc.id}')" class="delete-btn">✖</button>
                    </div>`;
            });
            container.insertAdjacentHTML('afterbegin', `<div class="total-ca-box">💰 Chiffre d'Affaires : <strong>${totalCA}€</strong></div>`);
        });

        db.collection("paniers_actifs").orderBy("derniere_maj", "desc").limit(10).onSnapshot((snapshot) => {
            const container = document.getElementById("visites-list");
            container.innerHTML = "<h3>🛒 Paniers Actifs</h3>";
            snapshot.forEach(doc => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="log-item" style="border-left: 4px solid var(--neon-purple);">
                        <span style="color: var(--neon-purple); font-weight: bold;">🛒 EN COURS</span><br>
                        <span>Utilisateur: <strong>${data.pseudo}</strong></span><br>
                        <span>Articles: ${data.articles.length}</span><br>
                        <button onclick="supprimerDoc('paniers_actifs', '${doc.id}')" class="delete-btn">✖</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
