<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin | Texture Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-section { margin-bottom: 40px; }
        .log-item { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .log-item span { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tableau de Bord Activité</h1>
        
        <div class="admin-section">
            <h2>🛒 Commandes Finalisées</h2>
            <div id="commandes-list">Chargement...</div>
        </div>

        <div class="admin-section">
            <h2>👀 Dernières Visites</h2>
            <div id="visites-list">Chargement...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDOLvy2PhthQZuBvaVPfq0TWquBuyP3gs4",
            authDomain: "texture-lab-fivem.firebaseapp.com",
            projectId: "texture-lab-fivem",
            storageBucket: "texture-lab-fivem.firebasestorage.app",
            appId: "1:342541770662:web:e1c9edd45f217f209d7967"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Afficher les commandes
        db.collection("commandes_finales").orderBy("date", "desc").limit(10).onSnapshot((snapshot) => {
            const container = document.getElementById("commandes-list");
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                container.innerHTML += `<div class="log-item"><span>${data.articles}</span> - ${data.total_prix}€ <br><small>${data.date.toDate().toLocaleString()}</small></div>`;
            });
        });

        // Afficher les visites
        db.collection("visites").orderBy("date", "desc").limit(15).onSnapshot((snapshot) => {
            const container = document.getElementById("visites-list");
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                container.innerHTML += `<div class="log-item">Page: ${data.page} <br><small>${data.date.toDate().toLocaleString()}</small></div>`;
            });
        });
    </script>
</body>
</html>
